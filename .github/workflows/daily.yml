name: Gold AI Signal

on:
  schedule:
    # 23:00 UTC (TR genelde UTC+3 => ~02:00). Haftanın her günü.
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot (log to file)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          echo "=== START ===" > runlog.txt
          python -u -X faulthandler signal_bot.py >> runlog.txt 2>&1
          echo "EXIT_CODE=$?" >> runlog.txt
          echo "=== LAST 120 LINES ==="
          tail -n 120 runlog.txt || true
          # Bot hata verdiyse job kırmızı olsun ama log kalsın:
          grep -q "EXIT_CODE=0" runlog.txt || exit 1

      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runlog
          path: runlog.txt
          if-no-files-found: error
