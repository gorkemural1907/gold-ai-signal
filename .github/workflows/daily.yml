name: Gold AI Signal

on:
  schedule:
    # Hafta içi her gün 22:00 UTC çalışır (TR saatine göre +3)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        run: |
          set -euxo pipefail
          python -u signal_bot.py
