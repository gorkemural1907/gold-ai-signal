name: Gold AI Signal

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Çalıştırmayı HER ZAMAN dosyaya yazdır
      - name: Run bot (write log file)
        run: |
          set +e
          python -u signal_bot.py > runlog.txt 2>&1
          echo "EXIT_CODE=$?" >> runlog.txt
          echo "---- LAST 120 LINES ----"
          tail -n 120 runlog.txt || true

      # Log dosyasını artifact olarak yükle (her zaman)
      - name: Upload log artifact
        uses: actions/upload-artifact@v4
        with:
          name: runlog
          path: runlog.txt
          if-no-files-found: error
